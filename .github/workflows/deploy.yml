name: Deploy sitio

# Se puede disparar de dos formas:
#   1. workflow_dispatch: la edge function trigger-build lo llama via API
#      cuando Emanuel publica un post.
#   2. push a main: cuando el desarrollador pushea cambios de código.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo del deploy (ej: nuevo post publicado)"
        required: false
        default: "deploy manual"
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build y deploy a production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (código fuente)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tmyh-web/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: tmyh-web

      - name: Build Astro
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          BASE_PATH: /
        run: npm run build
        working-directory: tmyh-web

      - name: Push dist/ a rama production
        id: push_production
        run: |
          # Clonar solo la rama production en un directorio temporal
          git clone --branch production --single-branch \
            https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/tradicionmisticayhermetica-web/tmyh-web.git \
            /tmp/production

          # Configurar identidad DENTRO del repo clonado
          cd /tmp/production
          git config user.name "tradicionmisticayhermetica-web"
          git config user.email "tradicionmisticayhermetica@gmail.com"

          # Borrar contenido anterior (excepto .git)
          find /tmp/production -mindepth 1 -not -path '/tmp/production/.git*' -delete

          # Copiar el nuevo build (la ruta es relativa al workspace de Actions)
          cp -r $GITHUB_WORKSPACE/tmyh-web/dist/. /tmp/production/

          git add -A

          # Solo commitear si hay cambios
          if git diff --staged --quiet; then
            echo "Sin cambios en el build, nada que deployar."
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            REASON="${{ github.event.inputs.reason || 'push a main' }}"
            git commit -m "deploy: ${REASON} ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push origin production
            echo "Deploy completado."
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi

      # Notificación inmediata a Ferozo via webhook configurado en GitHub
      # (Settings -> Webhooks). Cuando hacemos push a production, GitHub mismo
      # llama al webhook https://ferozo.host/deploy/git/<token> y Ferozo hace
      # pull al instante. Acá solo dejamos un confirm log.
      - name: Confirmar pull en Ferozo
        if: steps.push_production.outputs.deployed == 'true'
        run: |
          echo "Push a production realizado."
          echo "El webhook configurado en GitHub debería disparar el pull en Ferozo automáticamente."
          echo "Si tarda, revisar: Settings -> Webhooks -> Recent Deliveries en GitHub."
