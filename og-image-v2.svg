<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    Open Graph image para TM&H (1200x630, ratio 1.91:1 estandar de OG).
    Diseno: fondo noche con halos, sello solar central y titulos.
    Tipografia: serif generica del sistema (Georgia/Times) porque los
    crawlers OG no ejecutan JS ni cargan Google Fonts.

    Texto visible: entidades XML en <text> para tildes (compat. rasterizado).
    Si un crawler rechaza SVG, rasterizar a PNG (sharp-cli u otro).
  -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6c464" />
      <stop offset="100%" stop-color="#a8863d" />
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5ecd7" stop-opacity="0.85" />
      <stop offset="60%" stop-color="#e6c464" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#a8863d" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="bgTop" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="bgBottom" cx="85%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#6e1e30" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#6e1e30" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Fondo noche con dos halos -->
  <rect width="1200" height="630" fill="#07060d" />
  <rect width="1200" height="630" fill="url(#bgTop)" />
  <rect width="1200" height="630" fill="url(#bgBottom)" />

  <!-- Estrellas tenues -->
  <g fill="#ede2c4" opacity="0.35">
    <circle cx="120"  cy="90"  r="1.2" />
    <circle cx="240"  cy="180" r="0.9" />
    <circle cx="380"  cy="60"  r="1.1" />
    <circle cx="520"  cy="140" r="0.8" />
    <circle cx="750"  cy="80"  r="1.3" />
    <circle cx="920"  cy="160" r="0.9" />
    <circle cx="1080" cy="100" r="1.0" />
    <circle cx="150"  cy="520" r="0.9" />
    <circle cx="340"  cy="570" r="1.1" />
    <circle cx="620"  cy="540" r="0.8" />
    <circle cx="880"  cy="500" r="1.2" />
    <circle cx="1050" cy="560" r="0.9" />
  </g>
  <g fill="#e6c464" opacity="0.45">
    <circle cx="70"   cy="240" r="1.5" />
    <circle cx="1130" cy="370" r="1.6" />
    <circle cx="430"  cy="480" r="1.3" />
  </g>

  <!-- Halo radial detras del sello -->
  <circle cx="600" cy="280" r="220" fill="url(#glow)" />

  <!-- Sello solar alquimico (estilizado) -->
  <g transform="translate(600 280)">
    <!-- Rayos largos cada 45 grados -->
    <g stroke="url(#gold)" stroke-width="3" stroke-linecap="round">
      <line x1="0"     y1="-165" x2="0"     y2="-135" />
      <line x1="0"     y1="135"  x2="0"     y2="165" />
      <line x1="-165"  y1="0"    x2="-135"  y2="0" />
      <line x1="135"   y1="0"    x2="165"   y2="0" />
      <line x1="-116"  y1="-116" x2="-95"   y2="-95" />
      <line x1="95"    y1="95"   x2="116"   y2="116" />
      <line x1="95"    y1="-95"  x2="116"   y2="-116" />
      <line x1="-116"  y1="95"   x2="-95"   y2="116" />
    </g>
    <!-- Rayos cortos intermedios cada 22.5 grados -->
    <g stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round" opacity="0.55">
      <line x1="0" y1="-152" x2="0" y2="-138" transform="rotate(22.5)" />
      <line x1="0" y1="-152" x2="0" y2="-138" transform="rotate(67.5)" />
      <line x1="0" y1="-152" x2="0" y2="-138" transform="rotate(112.5)" />
      <line x1="0" y1="-152" x2="0" y2="-138" transform="rotate(157.5)" />
      <line x1="0" y1="-152" x2="0" y2="-138" transform="rotate(202.5)" />
      <line x1="0" y1="-152" x2="0" y2="-138" transform="rotate(247.5)" />
      <line x1="0" y1="-152" x2="0" y2="-138" transform="rotate(292.5)" />
      <line x1="0" y1="-152" x2="0" y2="-138" transform="rotate(337.5)" />
    </g>
    <!-- Anillo exterior -->
    <circle r="88" fill="none" stroke="url(#gold)" stroke-width="2.2" opacity="0.95" />
    <!-- Anillo interior tenue -->
    <circle r="62" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.55" />
    <!-- Punto central (disco solar) -->
    <circle r="16" fill="url(#gold)" />
  </g>

  <!-- Titulo principal (Cinzel-like, fallback serif) -->
  <text
    x="600"
    y="485"
    text-anchor="middle"
    font-family="'Cinzel', 'Trajan Pro', Georgia, 'Times New Roman', serif"
    font-size="54"
    font-weight="500"
    fill="#f5ecd7"
    letter-spacing="6"
  >TRADICION MISTICA</text>
  <text
    x="600"
    y="545"
    text-anchor="middle"
    font-family="'Cinzel', 'Trajan Pro', Georgia, 'Times New Roman', serif"
    font-size="54"
    font-weight="500"
    fill="#f5ecd7"
    letter-spacing="6"
  >Y HERMETICA</text>

  <!-- Linea divisoria dorada -->
  <line
    x1="460"
    y1="580"
    x2="740"
    y2="580"
    stroke="url(#gold)"
    stroke-width="1"
    opacity="0.6"
  />

  <!-- Subtitulo -->
  <text
    x="600"
    y="605"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
    font-size="20"
    font-style="italic"
    fill="#b8a984"
    letter-spacing="3"
  >Escuela de Simbologia, Espagiria y Hermetismo - Emanuel Mari</text>
</svg>
